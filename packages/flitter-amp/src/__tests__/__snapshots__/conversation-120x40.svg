<text x="28.8" y="530.04" style="fill:#969696" xml:space="preserve">  • </text>
<text x="62.400000000000006" y="530.04" style="fill:#f0c674;font-weight:bold" xml:space="preserve">src/auth/login.ts</text>
<text x="205.20000000000002" y="530.04" style="fill:#dcdcdc" xml:space="preserve"> — handles login flow</text>
<text x="1011.6" y="530.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="548.04" style="fill:#969696" xml:space="preserve">  • </text>
<text x="62.400000000000006" y="548.04" style="fill:#f0c674;font-weight:bold" xml:space="preserve">src/auth/session.ts</text>
<text x="222" y="548.04" style="fill:#dcdcdc" xml:space="preserve"> — session management</text>
<text x="1011.6" y="548.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="566.04" style="fill:#969696" xml:space="preserve">  • </text>
<text x="62.400000000000006" y="566.04" style="fill:#f0c674;font-weight:bold" xml:space="preserve">src/auth/middleware.ts</text>
<text x="247.20000000000002" y="566.04" style="fill:#dcdcdc" xml:space="preserve"> — Express middleware</text>
<text x="1011.6" y="566.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="584.04" style="fill:#dcdcdc" xml:space="preserve">The main issues I see are:</text>
<text x="1011.6" y="584.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="602.04" style="fill:#969896;opacity:0.5" xml:space="preserve">  1. </text>
<text x="70.80000000000001" y="602.04" style="fill:#dcdcdc;font-weight:bold" xml:space="preserve">Tight coupling</text>
<text x="188.4" y="602.04" style="fill:#dcdcdc" xml:space="preserve"> between session and login</text>
<text x="1011.6" y="602.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="620.04" style="fill:#969896;opacity:0.5" xml:space="preserve">  2. </text>
<text x="70.80000000000001" y="620.04" style="fill:#dcdcdc" xml:space="preserve">No </text>
<text x="96" y="620.04" style="fill:#dcdcdc;font-weight:bold" xml:space="preserve">token refresh</text>
<text x="205.20000000000002" y="620.04" style="fill:#dcdcdc" xml:space="preserve"> mechanism</text>
<text x="1011.6" y="620.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="28.8" y="638.04" style="fill:#969896;opacity:0.5" xml:space="preserve">  3. </text>
