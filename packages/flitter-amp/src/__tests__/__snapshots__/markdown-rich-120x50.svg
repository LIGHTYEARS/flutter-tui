<text x="28.8" y="404.04" style="fill:#c0caf5;font-weight:bold" xml:space="preserve">API Response Format</text>
<text x="1011.6" y="404.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="422.04" style="fill:#c0caf5" xml:space="preserve">  All endpoints return a </text>
<text x="222" y="422.04" style="fill:#c0caf5;font-weight:bold" xml:space="preserve">standardized</text>
<text x="322.8" y="422.04" style="fill:#c0caf5" xml:space="preserve"> JSON response:                                                                   </text>
<text x="1011.6" y="422.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="440.04" style="fill:#c0caf5" xml:space="preserve">  interface ApiResponse&lt;T&gt; {                                                                                           </text>
<text x="1011.6" y="440.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="458.04" style="fill:#c0caf5" xml:space="preserve">    success: boolean;                                                                                                  </text>
<text x="1011.6" y="458.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="476.04" style="fill:#c0caf5" xml:space="preserve">    data?: T;                                                                                                          </text>
<text x="1011.6" y="476.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="494.04" style="fill:#c0caf5" xml:space="preserve">    error?: {                                                                                                          </text>
<text x="1011.6" y="494.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="512.04" style="fill:#c0caf5" xml:space="preserve">      code: string;                                                                                                    </text>
<text x="1011.6" y="512.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="530.04" style="fill:#c0caf5" xml:space="preserve">      message: string;                                                                                                 </text>
<text x="1011.6" y="530.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="548.04" style="fill:#c0caf5" xml:space="preserve">    };                                                                                                                 </text>
