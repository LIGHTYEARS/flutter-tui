<text x="12" y="638.04" style="fill:#c0caf5" xml:space="preserve">                                        200  │ OK           │ Successful GET/PUT                                       </text>
<text x="1011.6" y="638.04" style="fill:#969896" xml:space="preserve">░</text>
<text x="12" y="656.04" style="fill:#c0caf5" xml:space="preserve">                                        201  │ Created      │ Successful POST                                          </text>
